<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tranquil Fleet</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Tranquil</h1>
        <p>Fleet observability for local coding agents</p>
      </div>
      <div class="stats" aria-label="Fleet totals">
        <span><strong id="stat-runs">0</strong> runs</span>
        <span><strong id="stat-live">0</strong> live</span>
        <span><strong id="stat-cost">$0.00</strong> est.</span>
        <span><strong id="stat-signals">0</strong> signaled</span>
      </div>
    </header>

    <main class="layout">
      <section class="fleet-panel" aria-labelledby="fleet-heading">
        <div class="section-head">
          <h2 id="fleet-heading">Fleet</h2>
          <div class="controls">
            <button type="button" id="refresh-button" title="Refresh runs">Refresh</button>
            <select id="status-filter" aria-label="Filter by status">
              <option value="">All states</option>
              <option value="running">Running</option>
              <option value="waiting">Waiting</option>
              <option value="completed">Completed</option>
              <option value="failed">Failed</option>
            </select>
            <select id="agent-filter" aria-label="Filter by agent">
              <option value="">All agents</option>
              <option value="claude-code">Claude Code</option>
              <option value="codex">Codex</option>
            </select>
            <input id="repo-filter" type="search" placeholder="Repo" aria-label="Filter by repo">
            <input id="branch-filter" type="search" placeholder="Branch" aria-label="Filter by branch">
            <input id="label-filter" type="search" placeholder="Label" aria-label="Filter by label">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Agent</th>
                <th>Repo / branch</th>
                <th>State</th>
                <th>Cost</th>
                <th>Activity</th>
                <th>Signals</th>
                <th>Note</th>
              </tr>
            </thead>
            <tbody id="runs-body">
              <tr><td colspan="7" class="empty">Waiting for events</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <aside class="detail-panel" aria-labelledby="detail-heading">
        <div class="section-head">
          <h2 id="detail-heading">Run</h2>
          <div class="controls">
            <select id="diff-target" aria-label="Diff against run" disabled>
              <option value="">Diff against</option>
            </select>
            <button type="button" id="diff-button" disabled>Diff</button>
            <button type="button" id="replay-button" disabled>Replay</button>
            <button type="button" id="fixture-button" disabled>Save Fixture</button>
          </div>
        </div>
        <div id="run-detail" class="detail-empty">Select a run to inspect its transcript.</div>
      </aside>
    </main>

    <section class="bottom-layout">
      <section class="signals-panel" aria-labelledby="signals-heading">
        <div class="section-head">
          <h2 id="signals-heading">Signals</h2>
        </div>
        <div id="signals-list" class="signals-list">No active signals.</div>
      </section>

      <section class="evals-panel" aria-labelledby="evals-heading">
        <div class="section-head">
          <h2 id="evals-heading">Evals</h2>
        </div>
        <div id="evals-list" class="evals-list">No evals yet.</div>
      </section>
    </section>

    <script src="/app.js" defer></script>
  </body>
</html>
